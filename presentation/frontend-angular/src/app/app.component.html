<header class="toolbar">
  <mat-slide-toggle [checked]="theme.isDark()" (change)="theme.toggle()">
    {{ theme.isDark() ? '🌙 Dark' : '☀️ Light' }}
  </mat-slide-toggle>
</header>

<mat-toolbar color="primary" class="toolbar">
  <span>Omnibus</span>
  <span class="spacer"></span>
  <span class="subtitle">Bridge bidding engine</span>
</mat-toolbar>

<main class="shell">

  <!-- NEXT BID -->
  <mat-card class="section-card">
    <app-next-bid></app-next-bid>
  </mat-card>

  <!-- FULL BIDDING -->
  <mat-card class="section-card">
    <app-rest-bidding></app-rest-bidding>
  </mat-card>

</main>
