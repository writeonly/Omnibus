<mat-toolbar color="primary" class="toolbar">

  <span class="logo">Omnibus</span>
  <span class="subtitle">Bridge bidding engine</span>

  <span class="spacer"></span>

  <mat-button-toggle-group [value]="activeRoute" (change)="onRouteChange($event.value)">

    <mat-button-toggle value="/bidding/next-bid">
      Next bid
    </mat-button-toggle>

    <mat-button-toggle value="/bidding/rest-bidding">
      Rest bidding
    </mat-button-toggle>

  </mat-button-toggle-group>

  <span class="spacer"></span>

  <!-- 🔐 AUTH SECTION -->

  <button *ngIf="!isLoggedIn"
          mat-raised-button
          color="accent"
          (click)="login()">
    Login
  </button>

  <div *ngIf="isLoggedIn" class="user-section">
    <span class="username">{{ username }}</span>

    <button mat-button (click)="logout()">
      Logout
    </button>
  </div>

  <span class="spacer"></span>

  <!-- 🌙 THEME -->

  <mat-slide-toggle [checked]="theme.isDark()" (change)="theme.toggle()">
    {{ theme.isDark() ? '🌙 Dark' : '☀️ Light' }}
  </mat-slide-toggle>

</mat-toolbar>

<main class="shell">
  <router-outlet></router-outlet>
</main>
