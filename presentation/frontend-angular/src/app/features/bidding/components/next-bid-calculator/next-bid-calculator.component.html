<div class="panel">

  <form class="grid grid--2" [formGroup]="form" (ngSubmit)="submit()">

    <div class="field">
      <label>Hand</label>
      <input formControlName="hand" />
    </div>

    <div class="field">
      <label>Auction</label>
      <input formControlName="auction" />
    </div>

    <div class="field">
      <label>Seat</label>
      <select formControlName="seat"></select>
    </div>

    <div class="field">
      <label>System</label>
      <select formControlName="system"></select>
    </div>

    <div class="grid" style="grid-column: 1 / -1;">
      <button class="btn btn--primary">Calculate</button>
      <button type="button" class="btn btn--secondary">Reset</button>
    </div>

  </form>

</div>
