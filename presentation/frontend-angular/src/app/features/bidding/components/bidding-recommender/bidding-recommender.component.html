<form class="form" (ngSubmit)="submit()">

  <app-feature-panel
    [title]="'Full bidding calculator'"
    [subtitle]="'Enter hands and bidding sequence'"
    [loading]="loading()"
    [error]="error()"
    [hasResult]="!!result()"
  >

    <div form-fields="">

      <div class="field">
        <label>North</label>
        <textarea rows="3"
          [ngModel]="form().northHand"
          (ngModelChange)="update('northHand', $event)"
          name="northHand"></textarea>
      </div>

      <div class="field">
        <label>South</label>
        <textarea rows="3"
          [ngModel]="form().southHand"
          (ngModelChange)="update('southHand', $event)"
          name="southHand"></textarea>
      </div>

      <div class="field">
        <label>Bidding</label>
        <input
          [ngModel]="form().bidding"
          (ngModelChange)="update('bidding', $event)"
          name="bidding" />
      </div>

      <div class="field">
        <label>System</label>
        <select
          [ngModel]="form().system"
          (ngModelChange)="update('system', $event)"
          name="system">
          <option value="POLISH_CLUB">Polish Club</option>
          <option value="STANDARD_AMERICAN">Standard American</option>
        </select>
      </div>

    </div>

    <div actions="">
      <button type="submit" class="btn--primary" [disabled]="loading()">
        {{ loading() ? 'Calculating...' : 'Calculate' }}
      </button>

      <button type="button" class="btn--secondary" (click)="reset()">
        Reset
      </button>
    </div>

    <div result="">
      <div class="bid">{{ result()?.bidding }}</div>
      <p class="text-muted">{{ result()?.explanation }}</p>
    </div>

  </app-feature-panel>

</form>
