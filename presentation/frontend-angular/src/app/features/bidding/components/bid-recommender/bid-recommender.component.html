<form class="form" (ngSubmit)="submit()">

  <app-feature-panel
    [title]="'Bid recommender'"
    [subtitle]="'Enter hand and bidding'"
    [loading]="loading()"
    [error]="error()"
    [hasResult]="!!result()"
  >

    <div form-fields="">

      <div class="field">
        <label>Hand</label>
        <textarea rows="4"
          [ngModel]="form().hand"
          (ngModelChange)="update('hand', $event)"
          name="hand"
        ></textarea>
      </div>

      <div class="field">
        <label>Auction</label>
        <input
          [ngModel]="form().bidding"
          (ngModelChange)="update('bidding', $event)"
          name="bidding"
        />
      </div>

      <div class="field">
        <label>System</label>
        <select
          [ngModel]="form().system"
          (ngModelChange)="update('system', $event)"
          name="system"
        >
          <option value="POLISH_CLUB">Polish Club</option>
          <option value="STANDARD_AMERICAN">Standard American</option>
        </select>
      </div>

    </div>

    <div actions="">
      <button type="submit" class="btn--primary" [disabled]="loading()">
        {{ loading() ? 'Calculating...' : 'Calculate' }}
      </button>

      <button type="button" class="btn--secondary" (click)="reset()">
        Reset
      </button>
    </div>

    <div result="">
      <div class="bid">{{ result()?.bid }}</div>
      <p class="text-muted">{{ result()?.explanation }}</p>
    </div>

  </app-feature-panel>

</form>
