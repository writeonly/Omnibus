<div class="panel">

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">

    <div class="field">
      <label>Hand</label>
      <input formControlName="hand" />
    </div>

    <div class="field">
      <label>Auction</label>
      <input formControlName="auction" />
    </div>

    <div class="field">
      <label>Seat</label>
      <select formControlName="seat">
        <option value="NORTH">North</option>
        <option value="SOUTH">South</option>
        <option value="EAST">East</option>
        <option value="WEST">West</option>
      </select>
    </div>

    <div class="field">
      <label>System</label>
      <select formControlName="system">
        <option value="POLISH_CLUB">Polish Club</option>
        <option value="STANDARD_AMERICAN">Standard American</option>
      </select>
    </div>

    <div style="grid-column: 1 / -1; display: flex; gap: 12px;">
      <button class="btn--primary" type="submit">
        Calculate
      </button>

      <button class="btn--secondary" type="button" (click)="reset()">
        Reset
      </button>
    </div>

  </form>

</div>
