<form class="form" [formGroup]="form" (ngSubmit)="submit()">

  <app-feature-panel
    [title]="'Full bidding calculator'"
    [subtitle]="'Enter hands and bidding sequence'"
    [loading]="loading()"
    [error]="error()"
    [hasResult]="!!result()"
  >

    <!-- FORM FIELDS -->
    <div form-fields>
      <div class="field">
        <label>North</label>
        <textarea rows="4" formControlName="northHand"></textarea>
      </div>

      <div class="field">
        <label>South</label>
        <textarea rows="4" formControlName="southHand"></textarea>
      </div>

      <div class="field">
        <label>Bidding</label>
        <input formControlName="bidding" />
      </div>

      <div class="field">
        <label>System</label>
        <select formControlName="system">
          <option value="POLISH_CLUB">Polish Club</option>
          <option value="STANDARD_AMERICAN">Standard American</option>
        </select>
      </div>
    </div>

    <!-- ACTIONS -->
    <div actions>
      <button
        type="submit"
        class="btn--primary"
        [disabled]="loading()"
      >
        {{ loading() ? 'Calculating...' : 'Calculate' }}
      </button>

      <button
        type="button"
        class="btn--secondary"
        (click)="reset()"
      >
        Reset
      </button>
    </div>

    <!-- RESULT -->
    <div result>
      <div class="bid">{{ result()?.bidding }}</div>
      <p class="text-muted">{{ result()?.explanation }}</p>
    </div>

  </app-feature-panel>

</form>
