services:

  frontend-angular:
    build:
      context: ./frontend-angular
      args:
        KEYCLOAK_URL: http://keycloak:8180
        KEYCLOAK_REALM: omnibus
        KEYCLOAK_CLIENT: omnibus-frontend
    ports:
      - "4300:80"
    depends_on:
      - bff-nest
    networks: [omnibus]

  bff-nest:
    build:
      context: ./bff-nest
    environment:
      KEYCLOAK_URL: http://keycloak:8180
      API_GATEWAY_GRPC_TARGET: http://api-gateway:8080
      PORT: 3000
    ports:
      - "3000:3000"
    networks: [omnibus]

networks:
  omnibus:
    name: omnibus
