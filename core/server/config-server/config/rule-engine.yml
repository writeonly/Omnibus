server:
  port: 8083

grpc:
  server:
    port: ${GRPC_PORT:9081}

omnibus:
  rules:
    storage-path: ${OMNIBUS_RULES_STORAGE_PATH:managed-rules}
  kafka:
    enabled: ${OMNIBUS_KAFKA_ENABLED:true}
    topics:
      recommendation-produced: omnibus.recommendation.produced
      rule-updated: omnibus.rule.updated

spring:
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
