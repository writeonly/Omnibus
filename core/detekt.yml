build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    LongMethod: 1
    LargeClass: 1

config:
  validation: true
  warningsAsErrors: false
  checkBuildUponDefaultConfig: false
  detekt:
    maxIssues: 0
    excludeCorrectable: false

input:
  useDefaultFilters: true
  excludeTest: false
  excludePaths:
    - '**/test/**'
    - '**/androidTest/**'
    - '**/.git/**'
    - '**/.gradle/**'
    - '**/build/**'
    - '**/node_modules/**'

output:
  currentDir: false
  outputFormats:
    - 'txt'
    - 'xml'
  reports:
    txt:
      active: true
    xml:
      active: true
    html:
      active: true
    sarif:
      active: true

comments:
  active: true
  excludeDeclarationsWithAnnotations:
    - 'Deprecated'
  excludeDeclarationsWithDocs: false
  excludeDeclarationsWithSingleLineComments: false
  requireUndocumentedPublicFunction: false
  requireUndocumentedPublicProperty: false
  requireUndocumentedPublicClass: false
  requireUndocumentedPublicInterface: false
  requireUndocumentedPublicMethod: false
  requireUndocumentedPublicEnum: false
  requireUndocumentedPublicEnumEntry: false
  requireUndocumentedPublicTypeAlias: false
  abusiveShortName:
    active: true
    threshold: 1
  dangling:
    active: true
  deprecatedBlockTag:
    active: true
  endOfSentenceFormat:
    active: true
    endOfSentenceFormat: '([.?!]|$)'
  kDoc:
    active: true
    excludeTagless: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  ComplexInterface:
    active: true
    threshold: 10
    includeStaticDeclarations: false
    includePrivateDeclarations: false
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
    ignoreDefaultParameters: false
    ignoreDataClasses: true
    ignoreAnnotatedParameter:
      - 'Inject'
      - 'PersistenceContext'
  MethodOverloading:
    active: true
    threshold: 6
  NamedArguments:
    active: true
    threshold: 3
    ignoreArgumentsOfAnnotatedParameter:
      - 'Test'
      - 'SpyBean'
  NestedBlockDepth:
    active: true
    threshold: 4
  NestedScopeFunctions:
    active: true
    threshold: 1
    includeNesting: false
  ReplaceSafeCallChainWithRun:
    active: true
  StringLiteralDuplication:
    active: true
    threshold: 3
    ignoreAnnotation: true
    excludeStringsWithLessThan5Characters: true
    ignoreStringsRegex: '^(a|i)$'
  TooManyFunctions:
    active: true
    thresholdInClasses: 11
    thresholdInInterfaces: 11
    thresholdInObjects: 11
    thresholdInEnums: 11
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: false

