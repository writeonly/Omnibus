syntax = "proto3";

package omnibus.v1;

option java_multiple_files = true;
option java_package = "pl.writeonly.omnibus.grpc.user.v1";
option java_outer_classname = "UserProto";

service UserService {
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string first_name = 4;
  string last_name = 5;
}

message RegisterUserResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string status = 4;
}
