<section class="result">
  <div class="headline">
    <p>Recommended call</p>
    <h2>{{ result.recommendedBid }}</h2>
    <span>{{ result.explanation }}</span>
  </div>

  <div class="details">
    <article>
      <h3>Request</h3>
      <p><strong>Hand:</strong> {{ result.hand }}</p>
      <p><strong>Auction:</strong> {{ result.auction || 'opening position' }}</p>
      <p><strong>System:</strong> {{ result.system }}</p>
    </article>

    <article>
      <h3>Candidate bids</h3>
      <ul>
        <li *ngFor="let candidate of result.candidates">
          <strong>{{ candidate.bid }}</strong> · {{ candidate.reason }}
        </li>
      </ul>
    </article>
  </div>
</section>
