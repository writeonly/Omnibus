<!DOCTYPE html>
<html>
<head>
  <title>Omnibus Dev Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    h1 { margin-bottom: 30px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 200px);
      gap: 20px;
    }
    a {
      display: block;
      padding: 20px;
      background: #1e293b;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      text-align: center;
    }
    a:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <h1>🚀 Omnibus Dev</h1>

  <div class="grid">
    <a href="/angular/">Angular</a>
    <a href="/react/">React</a>
    <a href="/api/">BFF API</a>
    <a href="/grafana/">Grafana</a>
    <a href="/keycloak/">Keycloak</a>
    <a href="/kafka/">Kafka UI</a>
  </div>
</body>
</html>
