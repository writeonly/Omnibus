global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: omnibus-audit-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - audit-service:8082

  - job_name: omnibus-user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8084

  - job_name: omnibus-rule-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - rule-service:8085

  - job_name: omnibus-workflow-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - workflow-service:8086

