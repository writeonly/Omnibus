# Profiles;
# - first: nginx, kibana, cassandra, kafka, elasticsearch, mongodb
# - follow: opensearch-dashboards, scylla, redpanda, opensearch, ferretdb
# - legacy: nginx

services:

  nginx:
    profiles:
      - legacy
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "8000:80"
    networks: [omnibus]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: omnibus-postgres
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      POSTGRES_DB: omnibus
      POSTGRES_USER: omnibus
      POSTGRES_PASSWORD: omnibus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    networks: [omnibus]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnibus -d omnibus"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres-init:
    image: postgres:16-alpine
    container_name: omnibus-postgres-init
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      PGPASSWORD: omnibus
    volumes:
      - ./postgres:/init:ro
    entrypoint:
      - /bin/sh
      - -c
      - psql -h postgres -U omnibus -d omnibus -v ON_ERROR_STOP=1 -f /init/001-outbox.sql
    depends_on:
      postgres:
        condition: service_healthy
    networks: [omnibus]

  kibana:
    profiles:
      - first
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: omnibus-kibana
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks: [omnibus]

  opensearch-dashboards:
    profiles:
      - follow
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: omnibus-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
    depends_on:
      - opensearch
    networks: [omnibus]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: omnibus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [omnibus]

  redis:
    image: redis:7-alpine
    container_name: omnibus-redis
    ports:
      - "6379:6379"
    networks: [omnibus]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: omnibus-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KEYCLOAK_ADMIN: kcadmin
      KEYCLOAK_ADMIN_PASSWORD: kcadmin
    volumes:
      - ./keycloak/realm-omnibus.json:/opt/keycloak/data/import/realm-omnibus.json:ro
    ports:
      - "9090:8080"
    networks: [omnibus]

  cassandra:
    profiles:
      - first
    image: cassandra:5.0
    container_name: omnibus-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks: [omnibus]

  cassandra-init:
    profiles:
      - first
    image: cassandra:5.0
    container_name: omnibus-cassandra-init
    depends_on:
      cassandra:
        condition: service_started
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo 'Waiting for Cassandra...';
        until cqlsh cassandra 9042 -e 'SELECT now() FROM system.local'; do sleep 5; done;
        echo 'Init...';
        cqlsh cassandra 9042 -f /init.cql;
    networks: [omnibus]

  scylla:
    profiles:
      - follow
    image: scylladb/scylla:latest
    container_name: omnibus-scylla
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 1G
    networks: [omnibus]

  scylla-init:
    profiles:
      - follow
    image: scylladb/scylla:latest
    container_name: omnibus-scylla-init
    depends_on:
      scylla:
        condition: service_started
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo 'Waiting for Scylla...';
        until cqlsh scylla 9042 -e "DESCRIBE KEYSPACES"; do sleep 5; done;
        echo 'Init...';
        cqlsh scylla 9042 -f /init.cql;
    networks: [omnibus]

  kafka:
    profiles:
      - first
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
    ports:
      - "29092:29092"
    networks: [omnibus]

  kafka-ui:
    profiles:
      - first
    image: provectuslabs/kafka-ui:latest
    container_name: omnibus-kafka-ui
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_NAME: local
    ports:
      - "9002:8080"
    networks: [omnibus]
  redpanda:
    profiles:
      - follow
    image: redpandadata/redpanda:latest
    container_name: omnibus-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  elasticsearch:
    profiles:
      - first
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: omnibus-elasticsearch
    environment:
      ES_JAVA_OPTS: "-Xms128m -Xmx256m"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      discovery.type: "single-node"
      xpack.security.enabled: false
    ports:
      - "9200:9200"
      - "9300:9300"
    networks: [omnibus]
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  opensearch:
    profiles:
      - follow
    image: opensearchproject/opensearch:2.14.0
    container_name: omnibus-opensearch
    environment:
      DISABLE_SECURITY_PLUGIN: true
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      OPENSEARCH_JAVA_OPTS: "-Xms128m -Xmx256m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: initial_admin_password
      discovery.type: "single-node"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
    - "9200:9200"
    - "9600:9600"
    networks: [omnibus]
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  mongodb:
    profiles:
      - first
    image: mongo:7.0
    container_name: omnibus-mongodb
    ports:
      - "27017:27017"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      MONGO_INITDB_ROOT_USERNAME: omnibus
      MONGO_INITDB_ROOT_PASSWORD: omnibus
      MONGO_INITDB_DATABASE: audit_db
    volumes:
      - mongo_data:/data/db
    networks: [omnibus]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  ferretdb:
    profiles:
      - follow
    image: ghcr.io/ferretdb/ferretdb:latest
    container_name: omnibus-ferretdb
    ports:
    - "27017:27017"
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://omnibus:omnibus@postgres:5432/omnibus
    depends_on:
      postgres:
        condition: service_healthy
    networks: [omnibus]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "27017"]
      interval: 10s
      timeout: 5s
      retries: 20

networks:
  omnibus:
    name: omnibus

volumes:
  postgres_data:
  mongo_data:
  cassandra_data:
  scylla_data:
  elastic_data:
  opensearch_data:
