# Profiles;
# - first: kibana, cassandra, kafka, elasticsearch, mongodb
# - follow: opensearch-dashboards, scylla, redpanda, opensearch, ferretdb
# - "false": grafana, loki, rabbitmq, prometheus, promtail
# - legacy: nginx

services:

  nginx:
    profiles:
      - legacy
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    mem_limit: 512m
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "8000:80"
    networks:
      omnibus:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    profiles:
      - "false"
    image: grafana/grafana:10.4.2
    container_name: omnibus-grafana
    mem_limit: 512m
    ports:
      - "3000:3000"
    networks:
      omnibus:

  loki:
    profiles:
      - "false"
    image: grafana/loki:2.9.6
    container_name: omnibus-loki
    mem_limit: 512m
    ports:
      - "3100:3100"
    networks:
      omnibus:

  postgres:
    image: postgres:16-alpine
    container_name: omnibus-postgres
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      POSTGRES_DB: omnibus
      POSTGRES_USER: omnibus
      POSTGRES_PASSWORD: omnibus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    networks:
      omnibus:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnibus -d omnibus"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    profiles:
      - first
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: omnibus-kibana
    mem_limit: 512m
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      omnibus:

  opensearch-dashboards:
    profiles:
      - follow
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: omnibus-opensearch-dashboards
    mem_limit: 512m
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
    depends_on:
      - opensearch
    networks:
      omnibus:
        aliases:
          - kibana

  rabbitmq:
    profiles:
      - "false"
    image: rabbitmq:3-management
    container_name: omnibus-rabbitmq
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      RABBITMQ_DEFAULT_USER: omnibus
      RABBITMQ_DEFAULT_PASS: omnibus
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      omnibus:

  redis:
    image: redis:7-alpine
    container_name: omnibus-redis
    mem_limit: 521m
    ports:
      - "6379:6379"
    networks:
      omnibus:

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: omnibus-keycloak
    mem_limit: 512m
    command: ["start-dev", "--import-realm"]
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KEYCLOAK_ADMIN: kcadmin
      KEYCLOAK_ADMIN_PASSWORD: kcadmin
    volumes:
      - ./keycloak/realm-omnibus.json:/opt/keycloak/data/import/realm-omnibus.json:ro
    ports:
      - "9000:8080"
    networks:
      omnibus:

  cassandra:
    profiles:
      - first
    image: cassandra:5.0
    container_name: omnibus-cassandra
    mem_limit: 512m
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      omnibus:

  scylla:
    profiles:
      - follow
    image: scylladb/scylla:latest
    container_name: omnibus-scylla
    mem_limit: 512m
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 1G
    networks:
      omnibus:
        aliases:
          - cassandra

  prometheus:
    profiles:
      - legacy
    image: prom/prometheus:v2.54.1
    container_name: omnibus-prometheus
    mem_limit: 512m
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      omnibus:

  kafka:
    profiles:
      - first
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    mem_limit: 512m
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
    ports:
      - "29092:29092"
    networks:
      omnibus:

  kafka-ui:
    profiles:
      - first
    image: provectuslabs/kafka-ui:latest
    container_name: omnibus-kafka-ui
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_NAME: local
    ports:
      - "9094:8080"
    networks:
      omnibus:

  redpanda:
    profiles:
      - follow
    image: redpandadata/redpanda:latest
    container_name: omnibus-redpanda
    mem_limit: 1G
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    networks:
      omnibus:
        aliases:
          - kafka

  elasticsearch:
    profiles:
      - first
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: omnibus-elasticsearch
    mem_limit: 512m
    environment:
      ES_JAVA_OPTS: "-Xms128m -Xmx256m"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      discovery.type: "single-node"
      xpack.security.enabled: false
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      omnibus:
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  opensearch:
    profiles:
      - follow
    image: opensearchproject/opensearch:2.14.0
    container_name: omnibus-opensearch
    mem_limit: 512m
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      OPENSEARCH_JAVA_OPTS: "-Xms128m -Xmx256m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: QQQqqq111!!!
      bootstrap.memory_lock: "true"
      discovery.type: "single-node"
      plugins.security.ssl.http.enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
    - "9200:9200"
    - "9600:9600"
    networks:
      omnibus:
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  mongodb:
    profiles:
      - first
    image: mongo:7.0
    container_name: omnibus-mongodb
    mem_limit: 512m
    ports:
      - "27017:27017"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      MONGO_INITDB_ROOT_USERNAME: omnibus
      MONGO_INITDB_ROOT_PASSWORD: omnibus
      MONGO_INITDB_DATABASE: audit_db
    volumes:
      - mongo_data:/data/db
    networks:
      omnibus:
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  ferretdb:
    profiles:
      - follow
    image: ghcr.io/ferretdb/ferretdb:latest
    container_name: omnibus-ferretdb
    mem_limit: 512m
    ports:
    - "27017:27017"
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://omnibus:omnibus@postgres:5432/omnibus
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      omnibus:
        aliases:
          - mongodb
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "27017"]
      interval: 10s
      timeout: 5s
      retries: 20

  filebeat:
    profiles:
        - first
        - follow
    image: docker.elastic.co/beats/filebeat:8.14.0
    container_name: omnibus-filebeat
    mem_limit: 512m
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - omnibus

  promtail:
    profiles:
      - "false"
    image: grafana/promtail:2.9.6
    container_name: omnibus-promtail
    mem_limit: 512m
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
    networks:
      omnibus:

networks:
  omnibus:
    name: omnibus

volumes:
  postgres_data:
  mongo_data:
  cassandra_data:
  scylla_data:
  elastic_data:
  opensearch_data:
