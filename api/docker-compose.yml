x-actuator-healthcheck: &actuator-healthcheck
  interval: 10s
  timeout: 5s
  retries: 20
  start_period: 30s

services:

  config-server:
    build:
      context: .
      dockerfile: server/config-server/Dockerfile
    container_name: config-server
    mem_limit: 512m
    ports:
      - "8888:8888"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8888; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_ENV: local
      CONFIG_REPO_LOCATION: file:/workspace/config
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./server/config-server/config:/workspace/config
    networks:
      - omnibus

  eureka-server:
    build:
      context: .
      dockerfile: server/eureka-server/Dockerfile
    container_name: eureka-server
    mem_limit: 512m
    ports:
      - "8761:8761"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8761; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - omnibus

  api-gateway:
    build:
      context: .
      dockerfile: server/api-gateway/Dockerfile
    mem_limit: 512m
    ports:
      - "8080:8080"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rule-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      workflow-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RULE_ENGINE_GRPC_URI: lb:h2c://rule-service
      WORKFLOW_ENGINE_GRPC_URI: lb:h2c://workflow-service
      USER_SERVICE_GRPC_URI: lb:h2c://user-service
      MODULITH_HTTP_URI: http://modulith:8081
    networks:
      - omnibus

  modulith:
    build:
      context: .
      dockerfile: server/modulith/Dockerfile
    mem_limit: 512m
    ports:
      - "8081:8081"
    healthcheck:
      <<: *actuator-healthcheck
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083
      USER_SERVICE_GRPC_URI: static://user-service:9082

      CASSANDRA_CONTACT_POINTS: cassandra:9042
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: audit

    networks:
      - omnibus
  audit-service:
    build:
      context: .
      dockerfile: service/audit-service/Dockerfile
    container_name: audit-service
    mem_limit: 512m
    ports:
      - "8082:8082"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8082; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      DB_URL: jdbc:postgresql://postgres:5432/audit_db
      DB_USERNAME: omnibus
      DB_PASSWORD: omnibus
      POSTGRES_DB: audit_db

      CASSANDRA_CONTACT_POINTS: cassandra:9042
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: audit

    networks:
      - omnibus

  auth-service:
    build:
      context: .
      dockerfile: server/auth-service/Dockerfile
    container_name: auth-service
    mem_limit: 512m
    ports:
      - "8083:8083"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8083; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
      POSTGRES_DB: auth_db
      DB_USERNAME: omnibus
      DB_PASSWORD: omnibus
      AUTH_ISSUER: http://auth-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - omnibus

  user-service:
    build:
      context: .
      dockerfile: service/user-service/Dockerfile
    container_name: user-service
    mem_limit: 512m
    ports:
      - "8084:8084"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8084; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # jeśli używasz DB w user-service:
      DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USERNAME: omnibus
      DB_PASSWORD: omnibus
      POSTGRES_DB: user_db
    networks:
      - omnibus


  rule-service:
    build:
      context: .
      dockerfile: service/rule-service/Dockerfile
    mem_limit: 512m
    ports:
      - "8085:8085"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8085; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - omnibus

  workflow-service:
    build:
      context: .
      dockerfile: service/workflow-service/Dockerfile
    mem_limit: 512m
    ports:
      - "8086:8086"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8086; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rule-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      AUTH_SERVER_URL: http://auth-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BIDDING_ENGINE_GRPC_ADDRESS: discovery:///rule-service
    networks:
      - omnibus

  outbox-relay-service:
    build:
      context: .
      dockerfile: legacy/outbox-relay-service/Dockerfile
    container_name: outbox-relay-service
    mem_limit: 512m
    ports:
      - "8087:8087"
    healthcheck:
      <<: *actuator-healthcheck
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8087; printf \"GET /actuator/health/readiness HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"UP\" <&3'"]
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m -XX:+UseSerialGC"
      CONFIG_SERVER_URL: http://name:password@config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USERNAME: omnibus
      DB_PASSWORD: omnibus
    networks:
      - omnibus

networks:
  omnibus:
    name: omnibus
