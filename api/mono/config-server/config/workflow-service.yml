server:
  port: 8086

grpc:
  server:
    port: ${GRPC_PORT:9084}
  client:
    rule-service:
      address: ${BIDDING_ENGINE_GRPC_ADDRESS:discovery:///rule-service}
      negotiation-type: plaintext

logging:
  file:
    name: logs/app.log
  level:
    root: INFO

eureka:
  instance:
    non-secure-port: ${GRPC_PORT:9082}
    metadata-map:
      grpc.port: ${GRPC_PORT:9082}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
