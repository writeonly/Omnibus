server:
  port: 8085

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/omnibus}
    username: ${DB_USERNAME:omnibus}
    password: ${DB_PASSWORD:omnibus}
    driver-class-name: org.postgresql.Driver
  cloud:
    stream:
      bindings:
        outboxEvents-out-0:
          destination: ${USER_REGISTERED_KAFKA_TOPIC:user.registered}
          content-type: application/json

outbox:
  relay:
    fixed-delay: ${OUTBOX_RELAY_POLL_DELAY:1000}
