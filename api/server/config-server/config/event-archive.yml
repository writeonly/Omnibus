server:
  port: 8081

spring:
  kafka:
    consumer:
      group-id: event-archive
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: pl.writeonly.omnibus.archive.events,java.util,java.lang
        spring.json.use.type.headers: false
  cassandra:
    contact-points: ${CASSANDRA_CONTACT_POINTS:localhost}
    port: ${CASSANDRA_PORT:9042}
    local-datacenter: ${CASSANDRA_DATACENTER:dc1}
    keyspace-name: ${CASSANDRA_KEYSPACE:omnibus}
    schema-action: create_if_not_exists

logging:
  file:
    name: logs/app.log
  level:
    root: INFO

omnibus:
  kafka:
    topics:
      recommendation-produced: omnibus.recommendation.produced
      rule-updated: omnibus.rule.updated
      bff-outbox-events: ${BFF_OUTBOX_KAFKA_TOPIC:bff.outbox.events}
