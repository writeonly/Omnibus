server:
  port: 8082

grpc:
  server:
    port: ${GRPC_PORT:9082}
  client:
    rule-engine:
      address: ${BIDDING_ENGINE_GRPC_ADDRESS:static://localhost:9081}
      negotiation-type: plaintext

spring:
  application:
    name: workflow-engine

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
