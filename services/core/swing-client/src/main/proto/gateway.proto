syntax = "proto3";

package gateway;

option java_multiple_files = true;
option java_package = "pl.writeonly.omnibus.grpc.gateway";

service GatewayService {
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
}
