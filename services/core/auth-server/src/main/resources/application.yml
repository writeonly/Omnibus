server:
  port: 9000

spring:
  application:
    name: auth-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      authorizationserver:
        issuer: ${AUTH_ISSUER:http://localhost:9000}

logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

management.endpoint.health:
  probes:
    enabled: true

management.health:
  readinessstate:
    enabled: true
  livenessstate:
    enabled: true
