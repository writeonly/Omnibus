services:

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_ENV: local
    volumes:
      - ../config:/workspace/config

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - bidding-engine
      # - workflow-orchestrator
    networks: [omnibus]

  bidding-engine:
    build:
      context: .
      dockerfile: ./services/bidding-engine/Dockerfile
    networks: [omnibus]

  workflow-orchestrator:
    profiles:
      - profileName
    build:
      context: .
      dockerfile: ./services/workflow-orchestrator/Dockerfile
    networks: [omnibus]

  event-archive:
    profiles:
      - profileName
    build:
      context: .
      dockerfile: ./services/event-archive/Dockerfile
    networks: [omnibus]

  outbox-relay-service:
    profiles:
      - profileName
    build:
      context: .
      dockerfile: ./services/outbox-relay-service/Dockerfile
    networks: [omnibus]

  cassandra-projection-service:
    profiles:
      - profileName
    build:
      context: .
      dockerfile: ./services/cassandra-projection-service/Dockerfile
    networks: [omnibus]

networks:
  omnibus:
