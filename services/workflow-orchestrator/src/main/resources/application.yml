server:
  port: 8082

spring:
  application:
    name: workflow-orchestrator

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

camunda:
  client:
    mode: self-managed
    auth:
      method: none
    grpc-address: ${CAMUNDA_GRPC_ADDRESS:http://localhost:26500}
    rest-address: ${CAMUNDA_REST_ADDRESS:http://localhost:8089}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

grpc:
  server:
    port: ${GRPC_PORT:9082}
  client:
    bidding-engine:
      address: ${BIDDING_ENGINE_GRPC_ADDRESS:static://localhost:9081}
      negotiation-type: plaintext
