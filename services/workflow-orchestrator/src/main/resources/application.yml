server:
  port: 8082

spring:
  application:
    name: workflow-orchestrator

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

camunda:
  client:
    mode: self-managed
    auth:
      method: none
    grpc-address: ${CAMUNDA_GRPC_ADDRESS:http://localhost:26500}
    rest-address: ${CAMUNDA_REST_ADDRESS:http://localhost:8089}

omnibus:
  workflow:
    bidding-engine-base-url: ${BIDDING_ENGINE_BASE_URL:http://localhost:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
