services:
  # =========================
  # CORE (DEFAULT START)
  # =========================

  bidding-engine:
    build:
      context: ./services/bidding-engine
    container_name: omnibus-bidding-engine
    ports:
      - "8080:8080"
    networks: [omnibus]

  bff-nest:
    build:
      context: ./presentation/bff-nest
    container_name: omnibus-bff
    environment:
      BACKEND_BASE_URL: http://bidding-engine:8080
      WORKFLOW_BASE_URL: http://workflow-orchestrator:8082
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: omnibus
      KEYCLOAK_CLIENT_ID: omnibus-frontend
      PORT: 3000
    ports:
      - "3000:3000"
    networks: [omnibus]
    depends_on:
      - bidding-engine

  frontend-angular:
    build:
      context: ./presentation/frontend-angular
    container_name: omnibus-frontend
    networks: [omnibus]
    depends_on:
      - bff-nest

  nginx:
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    networks: [omnibus]

  # =========================
  # INFRA (OPTIONAL)
  # =========================

  zeebe:
    image: camunda/zeebe:8.8.0
    container_name: omnibus-zeebe
    profiles: ["infra"]
    environment:
      ZEEBE_BROKER_CLUSTER_CLUSTERSIZE: 1
      ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT: 1
      ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR: 1
    ports:
      - "26500:26500"
      - "8089:8080"
    networks: [omnibus]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    profiles: ["infra"]
    ports:
      - "29092:29092"
    networks: [omnibus]

  cassandra:
    image: cassandra:5.0
    container_name: omnibus-cassandra
    profiles: ["infra"]
    ports:
      - "9042:9042"
    networks: [omnibus]

  cassandra-init:
    image: cassandra:5.0
    container_name: omnibus-cassandra-init
    profiles: ["infra"]
    networks: [omnibus]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: omnibus-keycloak
    profiles: ["infra"]
    command: ["start-dev"]
    ports:
      - "9090:8080"
    networks: [omnibus]

  workflow-orchestrator:
    build:
      context: ./services/workflow-orchestrator
    container_name: omnibus-workflow-orchestrator
    profiles: ["infra"]
    ports:
      - "8082:8082"
    networks: [omnibus]

  event-archive:
    build:
      context: ./services/event-archive
    container_name: omnibus-event-archive
    profiles: ["infra"]
    ports:
      - "8081:8081"
    networks: [omnibus]

  # =========================
  # OBSERVABILITY (OPTIONAL)
  # =========================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: omnibus-prometheus
    profiles: ["obs"]
    ports:
      - "9091:9090"
    networks: [omnibus]

  loki:
    image: grafana/loki:2.9.6
    container_name: omnibus-loki
    profiles: ["obs"]
    ports:
      - "3100:3100"
    networks: [omnibus]

  promtail:
    image: grafana/promtail:2.9.6
    container_name: omnibus-promtail
    profiles: ["obs"]
    networks: [omnibus]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omnibus-grafana
    profiles: ["obs"]
    ports:
      - "3001:3000"
    networks: [omnibus]

networks:
  omnibus:
