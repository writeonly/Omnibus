services:

  nginx:
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    profiles: ["infra"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    networks: [omnibus]

  # =========================
  # FRONTEND / BFF
  # =========================

  frontend-angular:
    build:
      context: ./presentation/frontend-angular
      dockerfile: Dockerfile
    container_name: omnibus-frontend
    ports:
      - "4200:80"
    networks: [omnibus]

frontend-react:
  build:
    context: ./presentation/frontend-react
    dockerfile: Dockerfile
  container_name: omnibus-frontend-react
  ports:
    - "4300:80"
  networks: [omnibus]

  bff-nest:
    build:
      context: ./presentation/bff-nest
      dockerfile: Dockerfile
    container_name: omnibus-bff
    environment:
      BIDDING_ENGINE_GRPC_TARGET: http://bidding-engine:9081
      WORKFLOW_ORCHESTRATOR_GRPC_TARGET: http://workflow-orchestrator:9082
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: omnibus
      KEYCLOAK_CLIENT_ID: omnibus-frontend
      BFF_OUTBOX_DATABASE_URL: postgres://omnibus:omnibus@postgres:5432/omnibus
      BFF_OUTBOX_ENABLED: "true"
      PORT: 3000
    ports:
      - "3000:3000"
    networks: [omnibus]
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  # =========================
  # CORE MICROSERVICES
  # =========================
  event-archive:
    build:
      context: .
      dockerfile: ./services/event-archive/Dockerfile
    container_name: omnibus-event-archive
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: omnibus
      BFF_OUTBOX_KAFKA_TOPIC: bff.outbox.events
    ports:
      - "8083:8083"
    networks: [omnibus]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully

  workflow-orchestrator:
    build:
      context: .
      dockerfile: ./services/workflow-orchestrator/Dockerfile
    container_name: omnibus-workflow-orchestrator
    environment:
      CAMUNDA_GRPC_ADDRESS: http://zeebe:26500
      CAMUNDA_REST_ADDRESS: http://zeebe:8080
      BIDDING_ENGINE_GRPC_ADDRESS: static://bidding-engine:9081
      GRPC_PORT: 9082
    ports:
      - "8082:8082"
      - "9082:9082"
    networks: [omnibus]
    depends_on:
      bidding-engine:
        condition: service_started

  bidding-engine:
    build:
      context: .
      dockerfile: ./services/bidding-engine/Dockerfile
    container_name: omnibus-bidding-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_PORT: 9081
    volumes:
      - ./services/bidding-engine/managed-rules:/app/managed-rules
    ports:
      - "8081:8081"
      - "9081:9081"
    networks: [omnibus]
    depends_on:
      kafka:
        condition: service_healthy

  # =========================
  # INFRA
  # =========================

  postgres:
    image: postgres:16-alpine
    container_name: omnibus-postgres
    environment:
      POSTGRES_DB: omnibus
      POSTGRES_USER: omnibus
      POSTGRES_PASSWORD: omnibus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    networks: [omnibus]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnibus -d omnibus"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres-init:
    image: postgres:16-alpine
    container_name: omnibus-postgres-init
    environment:
      PGPASSWORD: omnibus
    volumes:
      - ./infra/postgres:/init:ro
    entrypoint:
      - /bin/sh
      - -c
      - psql -h postgres -U omnibus -d omnibus -v ON_ERROR_STOP=1 -f /init/001-outbox.sql
    networks: [omnibus]
    depends_on:
      postgres:
        condition: service_healthy

  outbox-relay:
    build:
      context: ./infra/outbox-relay
      dockerfile: Dockerfile
    container_name: omnibus-outbox-relay
    environment:
      OUTBOX_DATABASE_URL: postgres://omnibus:omnibus@postgres:5432/omnibus
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OUTBOX_KAFKA_TOPIC: bff.outbox.events
    networks: [omnibus]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    ports:
      - "29092:29092"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

    networks: [omnibus]

  cassandra:
    image: cassandra:5.0
    container_name: omnibus-cassandra

    environment:
      CASSANDRA_CLUSTER_NAME: OmnibusCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M

    ports:
      - "9042:9042"

    volumes:
      - cassandra_data:/var/lib/cassandra

    networks: [omnibus]

    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  cassandra-init:
    image: cassandra:5.0
    container_name: omnibus-cassandra-init

    depends_on:
      cassandra:
        condition: service_healthy

    volumes:
      - ./infra/cassandra/init.cql:/init.cql:ro

    entrypoint:
      [
        "/bin/bash",
        "-c",
        "
        echo 'Waiting for Cassandra...';
        until cqlsh cassandra 9042 -e 'SELECT now() FROM system.local'; do
          sleep 5;
        done;

        echo 'Running init script...';
        cqlsh cassandra 9042 -f /init.cql;
        "
      ]

    networks: [omnibus]

  # =========================
  # OBSERVABILITY
  # =========================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: omnibus-prometheus
    profiles: ["obs"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [omnibus]

  loki:
    image: grafana/loki:2.9.6
    container_name: omnibus-loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks: [omnibus]

  promtail:
    image: grafana/promtail:2.9.6
    container_name: omnibus-promtail
    profiles: ["obs"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [omnibus]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omnibus-grafana
    profiles: ["obs"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks: [omnibus]

networks:
  omnibus:

volumes:
  postgres_data:
  cassandra_data:
