services:

  # =========================
  # ENTRYPOINT
  # =========================

  nginx:
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    profiles: ["infra"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    networks: [omnibus]

  # =========================
  # FRONTEND / BFF
  # =========================

  frontend-angular:
    build:
      context: ./presentation/frontend-angular
    container_name: omnibus-frontend
    ports:
      - "8080:80"
    networks: [omnibus]

  bff-nest:
    build:
      context: ./presentation/bff-nest
    container_name: omnibus-bff
    environment:
      BIDDING_ENGINE_BASE_URL: http://bidding-engine:8081
      WORKFLOW_ORCHESTRATOR_BASE_URL: http://workflow-orchestrator:8082
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: omnibus
      KEYCLOAK_CLIENT_ID: omnibus-frontend
      PORT: 3000
    ports:
      - "3000:3000"
    networks: [omnibus]

  # =========================
  # CORE MICROSERVICES
  # =========================

  bidding-engine:
    build:
      context: ./services/bidding-engine
    container_name: omnibus-bidding-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./services/bidding-engine/managed-rules:/app/managed-rules
    ports:
      - "8081:8081"
    networks: [omnibus]

  workflow-orchestrator:
    build:
      context: ./services/workflow-orchestrator
    container_name: omnibus-workflow-orchestrator
    environment:
      CAMUNDA_GRPC_ADDRESS: http://zeebe:26500
      CAMUNDA_REST_ADDRESS: http://zeebe:8080
      BIDDING_ENGINE_BASE_URL: http://bidding-engine:8081
    ports:
      - "8082:8082"
    networks: [omnibus]

  event-archive:
    profiles: ["archive"]
    build:
      context: ./services/event-archive
    container_name: omnibus-event-archive
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: omnibus
    ports:
      - "8083:8083"
    networks: [omnibus]

  # =========================
  # INFRA
  # =========================

  zeebe:
    image: camunda/zeebe:8.8.0
    container_name: omnibus-zeebe
    environment:
      ZEEBE_BROKER_CLUSTER_CLUSTERSIZE: 1
      ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT: 1
      ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR: 1
      ZEEBE_BROKER_THREADS_CPUTHREADCOUNT: 2
      ZEEBE_BROKER_THREADS_IOTHREADCOUNT: 2
    ports:
      - "8181:8080"
      - "26500:26500"
    networks: [omnibus]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: omnibus-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: kcadmin
      KEYCLOAK_ADMIN_PASSWORD: kcadmin
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-omnibus.json:/opt/keycloak/data/import/realm-omnibus.json:ro
    ports:
      - "8182:8080"
    networks: [omnibus]

  redis:
    image: redis:7-alpine
    container_name: omnibus-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks: [omnibus]

  rabbitmq:
    image: rabbitmq:3-management
    container_name: omnibus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [omnibus]

  postgres:
    image: postgres:16-alpine
    container_name: omnibus-postgres
    environment:
      POSTGRES_DB: omnibus
      POSTGRES_USER: omnibus
      POSTGRES_PASSWORD: omnibus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [omnibus]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    networks: [omnibus]

  cassandra:
    profiles: ["archive"]
    image: cassandra:5.0
    container_name: omnibus-cassandra

    environment:
      CASSANDRA_CLUSTER_NAME: OmnibusCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch

      # 🚀 SPEED TUNING
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M

    ports:
      - "9042:9042"

    volumes:
      - cassandra_data:/var/lib/cassandra

    networks: [omnibus]

    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  cassandra-init:
    profiles: ["archive"]
    image: cassandra:5.0
    container_name: omnibus-cassandra-init

    depends_on:
      cassandra:
        condition: service_healthy

    volumes:
      - ./infra/cassandra/init.cql:/init.cql:ro

    entrypoint:
      [
        "/bin/bash",
        "-c",
        "
        echo 'Waiting for Cassandra...';
        until cqlsh cassandra 9042 -e 'SELECT now() FROM system.local'; do
          sleep 3;
        done;

        echo 'Running init script...';
        cqlsh cassandra 9042 -f /init.cql;
        "
      ]

    networks: [omnibus]

  # =========================
  # OBSERVABILITY
  # =========================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: omnibus-prometheus
    profiles: ["obs"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [omnibus]

  loki:
    image: grafana/loki:2.9.6
    container_name: omnibus-loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks: [omnibus]

  promtail:
    image: grafana/promtail:2.9.6
    container_name: omnibus-promtail
    profiles: ["obs"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [omnibus]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omnibus-grafana
    profiles: ["obs"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks: [omnibus]

networks:
  omnibus:

volumes:
  postgres_data:
  cassandra_data:
