services:
  zeebe:
    image: camunda/zeebe:8.8.0
    container_name: omnibus-zeebe
    environment:
      ZEEBE_BROKER_CLUSTER_CLUSTERSIZE: 1
      ZEEBE_BROKER_CLUSTER_PARTITIONSCOUNT: 1
      ZEEBE_BROKER_CLUSTER_REPLICATIONFACTOR: 1
      ZEEBE_BROKER_THREADS_CPUTHREADCOUNT: 2
      ZEEBE_BROKER_THREADS_IOTHREADCOUNT: 2
    ports:
      - "26500:26500"
      - "8089:8080"
    networks: [omnibus]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnibus-kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    networks: [omnibus]

  cassandra:
    image: cassandra:5.0
    container_name: omnibus-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: OmnibusCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    ports:
      - "9042:9042"
    networks: [omnibus]

  cassandra-init:
    image: cassandra:5.0
    container_name: omnibus-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./infra/cassandra/init.cql:/init.cql:ro
    entrypoint: ["/bin/bash", "-c", "cqlsh cassandra 9042 -f /init.cql"]
    networks: [omnibus]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: omnibus-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: kcadmin
      KEYCLOAK_ADMIN_PASSWORD: kcadmin
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-omnibus.json:/opt/keycloak/data/import/realm-omnibus.json:ro
    ports:
      - "9090:8080"
    networks: [omnibus]

  bidding-engine:
    build:
      context: ./services/bidding-engine
    container_name: omnibus-bidding-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./services/bidding-engine/managed-rules:/app/managed-rules
    depends_on: [kafka]
    ports:
      - "8080:8080"
    networks: [omnibus]

  workflow-orchestrator:
    build:
      context: ./services/workflow-orchestrator
    container_name: omnibus-workflow-orchestrator
    environment:
      CAMUNDA_GRPC_ADDRESS: http://zeebe:26500
      CAMUNDA_REST_ADDRESS: http://zeebe:8080
      BIDDING_ENGINE_BASE_URL: http://bidding-engine:8080
    depends_on: [zeebe, bidding-engine]
    ports:
      - "8082:8082"
    networks: [omnibus]

  event-archive:
    build:
      context: ./services/event-archive
    container_name: omnibus-event-archive
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_CONTACT_POINTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: omnibus
    depends_on: [kafka, cassandra-init]
    ports:
      - "8081:8081"
    networks: [omnibus]

  bff-nest:
    build:
      context: ./presentation/bff-nest
    container_name: omnibus-bff
    environment:
      BACKEND_BASE_URL: http://bidding-engine:8080
      WORKFLOW_BASE_URL: http://workflow-orchestrator:8082
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: omnibus
      KEYCLOAK_CLIENT_ID: omnibus-frontend
      PORT: 3000
    depends_on:
      - keycloak
      - bidding-engine
      - workflow-orchestrator
    ports:
      - "3000:3000"
    networks: [omnibus]

  frontend-angular:
    build:
      context: ./presentation/frontend-angular
    container_name: omnibus-frontend
    depends_on: [bff-nest]
    networks: [omnibus]

  nginx:
    image: nginx:1.27-alpine
    container_name: omnibus-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-angular
      - bff-nest
      - bidding-engine
      - workflow-orchestrator
      - keycloak
    ports:
      - "8088:80"
    networks: [omnibus]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: omnibus-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    networks: [omnibus]

  # =========================
  # LOGGING STACK (LOKI)
  # =========================

  loki:
    image: grafana/loki:2.9.6
    container_name: omnibus-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks: [omnibus]

  promtail:
    image: grafana/promtail:2.9.6
    container_name: omnibus-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    networks: [omnibus]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omnibus-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on: [loki, prometheus]
    networks: [omnibus]

networks:
  omnibus:
  